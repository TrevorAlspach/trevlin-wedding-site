name: Deploy to Azure Container Apps

on:
  workflow_run:
    workflows: ["Build & Push Image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHA="${{ github.sha }}"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
          fi
          echo "value=sha-${SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy image to Container App
        uses: azure/cli@v2
        with:
          inlineScript: |
            az extension add --name containerapp --upgrade

            az containerapp secret set \
              --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --secrets \
                openai-api-key="${{ secrets.OPENAI_API_KEY }}" \
                access-request-form-id="${{ secrets.ACCESS_REQUEST_FORM_ID }}"

            az containerapp update \
              --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --image "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}" \
              --set-env-vars \
                OPENAI_API_KEY=secretref:openai-api-key \
                ACCESS_REQUEST_FORM_ID=secretref:access-request-form-id \
                OPENAI_MODEL="${{ vars.OPENAI_MODEL || 'gpt-5.6-luna' }}"
