server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Privacy & security headers ---
    # Keep the site out of search engines (authoritative, beats stray inbound links)
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
    # Don't leak the URL to outbound links (e.g. registry -> Amazon)
    add_header Referrer-Policy "no-referrer" always;
    # No embedding in iframes; no MIME sniffing
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Content Security Policy. connect-src allows any HTTPS host so the chat API
    # keeps working regardless of its domain — tighten to the exact host later.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https:; form-action 'self' https://formspree.io; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets. Re-declare the security headers here because an
    # add_header in a location block stops inheritance of the server-level ones.
    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
}
